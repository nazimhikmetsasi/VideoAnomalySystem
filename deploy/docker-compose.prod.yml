# Production — SSL + reverse proxy ile tam stack
# Kullanim: deploy\prod-up.bat

x-backend-env: &backend-env
  KAFKA_ENABLED: "true"
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  POSTGRES_HOST: postgres
  DATABASE_URL: postgresql://mcbu_user:${POSTGRES_PASSWORD:-anomaly_password}@postgres:5432/anomaly_db
  MONGO_HOST: mongodb
  API_HOST: 0.0.0.0
  API_PORT: 8000
  AUTH_ENABLED: "true"
  AUTH_SECRET: ${AUTH_SECRET:-degistirin-production-secret}
  AUTH_STRICT: "true"
  STREAM_MODE: python
  USE_GPU: "false"
  ZONE_CONFIG_PATH: /app/config/zones.json

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [anomaly-net]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: always
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks: [anomaly-net]

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: mcbu_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anomaly_password}
      POSTGRES_DB: anomaly_db
    volumes: [postgres_data:/var/lib/postgresql/data]
    networks: [anomaly-net]

  mongodb:
    image: mongo:6.0
    restart: always
    volumes: [mongo_data:/data/db]
    networks: [anomaly-net]

  stream-processor:
    build: { context: .., dockerfile: Dockerfile.backend }
    restart: always
    command: ["python", "main_stream.py", "python"]
    depends_on: [kafka]
    environment: { <<: *backend-env }
    volumes: [../config:/app/config:ro]
    networks: [anomaly-net]

  api:
    build: { context: .., dockerfile: Dockerfile.backend }
    restart: always
    command: ["python", "main_api.py"]
    depends_on: [kafka, postgres, mongodb]
    env_file: [../.env]
    environment: { <<: *backend-env }
    volumes:
      - ../config:/app/config:ro
      - ../results:/app/results
    networks: [anomaly-net]

  frontend:
    build: { context: .., dockerfile: Dockerfile.frontend }
    restart: always
    depends_on: [api]
    networks: [anomaly-net]

  proxy:
    image: nginx:alpine
    restart: always
    depends_on: [frontend, api]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks: [anomaly-net]

networks:
  anomaly-net:

volumes:
  postgres_data:
  mongo_data:
